# retailers.toml  —  add a new retailer by adding a new [retailers.<id>] block.
#
# Supported methods:
#   json_ld_brand_page  — brand/category page that embeds JSON-LD ItemList per page
#   html_brand_page     — brand/category page with CSS-selectable product cards
#   rest_api            — JSON REST search API (results filtered by brand in-memory)
#
# When a retailer's page is unreachable the scraper logs the error and skips it
# for the day (no snapshots written), so the dashboard won't show stale "not
# available" data.

[defaults]
request_delay = 1.5   # seconds between pages
language     = "nl"
enabled      = true

# ── Dutch retailers ────────────────────────────────────────────────────────────

[retailers.obelink]
name          = "Obelink"
method        = "json_ld_brand_page"
brand_page_url = "https://www.obelink.nl/merken/mestic/"
pagination_param = "p"          # URL param used for page 2+: ?p=2, ?p=3, …
language       = "nl"

[retailers.vrijbuiter]
name          = "Vrijbuiter"
method        = "rest_api"
search_url    = "https://www.vrijbuiter.nl/api/search"
query_param   = "q"             # URL param for the query
search_query  = "Mestic"        # what to search for
results_key   = "products"      # JSON key that holds the array of results
name_path     = "name"          # dot-path to product name field
price_path    = "price.inclTax" # dot-path to price (inc. tax)
url_path      = "url"           # dot-path to product URL
brand_filter_field  = "brand.name"  # filter results to this field …
brand_filter_value  = "Mestic"       # … matching this value (case-insensitive)
sku_path            = "number"       # retailer article number field
language      = "nl"

# ── German retailers ───────────────────────────────────────────────────────────

[retailers.fritz_berger]
name          = "Fritz Berger"
method        = "html_brand_page"
brand_page_url = "https://www.berger-camping.nl/marken/mestic/"
card_selector  = "div.element_artikel_gallery"
name_selector  = ".element_artikel_gallery__name"
price_selectors = [
    "span.prod_price__discount_price",  # sale price (preferred)
    "span.prod_price__price",           # regular price (fallback)
]
url_selector   = "a.element_artikel_gallery__link"
price_locale   = "de"   # European: '.' = thousands, ',' = decimal
language       = "nl"

[retailers.wagner]
name             = "Wagner"
enabled          = true
method           = "playwright_html_brand_page"
brand_page_url   = "https://www.campingwagner.de/de/s/?q=Mestic"
pagination_param = "page"
card_selector    = "li.gallery-listing-v2__item"
name_selector    = ".gallery-listing-v2__title a"
price_selectors  = [
    "p.gallery-listing-v2__price",     # sale / shown price
    "p.gallery-listing-v2__uvp del",   # RRP fallback
]
url_selector     = "a.gallery-listing-v2__image-link"
price_locale     = "de"
language         = "de"
load_wait        = 5

# ── Dutch webshops ────────────────────────────────────────────────────────────

[retailers.kampeerhal_roden]
name           = "Kampeerhal Roden"
method         = "playwright_tweakwise"
brand_page_url = "https://www.kampeerhalroden.nl/search-results?tn_q=mestic&tn_fk_ae-brand=Mestic"
card_selector  = ".twn-starter__products-grid-item"
tile_selector  = ".twn-product-tile-dynamic"
language       = "nl"
load_wait      = 10
goto_timeout   = 60000
max_retries    = 2

[retailers.bol_com]
name       = "Bol.com"
method     = "bol_react_router"
search_url = "https://www.bol.com/nl/nl/s/?searchtext=mestic"
language   = "nl"
load_wait  = 8        # React Router needs time to hydrate
max_pages  = 6        # 137 products ÷ 25 per page

[retailers.van_den_elzen]
name          = "Van den Elzen"
method        = "playwright_js_extract"
brand_page_url = "https://www.vdelzencaravans.nl/zoeken?keyword=mestic"
language      = "nl"
load_wait     = 5
scroll        = true
js_extract    = '''
() => {
    const BASE = 'https://www.vdelzencaravans.nl';
    const results = [];
    const links = Array.from(document.querySelectorAll('a[href*="/product/"]'));
    for (const link of links) {
        const nameEl = link.querySelector('span.font-semibold');
        const name   = nameEl ? nameEl.textContent.trim() : '';
        if (!name) continue;
        const url = BASE + link.getAttribute('href');
        let price = null;
        const parent = link.parentElement;
        const priceEl = parent && parent.querySelector('.text-theme-yellow span.font-semibold');
        if (priceEl) {
            const txt = priceEl.textContent.replace(/[€ .]/g, '').replace(',', '.').trim();
            price = parseFloat(txt) || null;
        }
        results.push({name, url, price});
    }
    return results;
}
'''

[retailers.kampeerwereld]
name          = "Kampeerwereld"
method        = "playwright_html_brand_page"
brand_page_url = "https://www.kampeerwereld.nl/mestic/"
card_selector  = ".product-box"
name_selector  = "a.product-name"
price_selectors = ["input[name='dtgs-gtm-product-price']"]
price_attr     = "value"          # read the HTML value= attribute, not inner text
url_selector   = "a.product-name"
price_locale   = "nl"
language       = "nl"
load_wait      = 5                # seconds to wait after domcontentloaded (Shopware 6 hydration)

# ── German retailers ───────────────────────────────────────────────────────────

[retailers.amazon_de]
name          = "Amazon.de"
method        = "amazon_search_page"
search_url    = "https://www.amazon.de/s?k=mestic"
price_selectors = [".a-price .a-offscreen"]
price_locale   = "de"
language       = "de"
request_delay  = 2.5              # be polite to Amazon
max_pages      = 5

# ── Template for a new retailer ────────────────────────────────────────────────
# Copy and fill in for each new site.
#
# [retailers.new_retailer]
# name           = "New Retailer"
# method         = "html_brand_page"          # or json_ld_brand_page / rest_api
# brand_page_url = "https://www.example.com/brands/mestic/"
# card_selector  = "div.product-card"
# name_selector  = ".product-name"
# price_selectors = [".price-sale", ".price"]
# url_selector   = "a.product-link"
# price_locale   = "nl"                       # nl or de
# language       = "nl"
# request_delay  = 2.0                        # optional override
