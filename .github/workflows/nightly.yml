name: Nightly Scrape & Publish

on:
  schedule:
    - cron: '0 4 * * *'   # 06:00 Amsterdam (CEST = UTC+2)
  workflow_dispatch:        # allow manual trigger from the Actions tab

permissions:
  contents: write   # push updated DB back to main
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium system deps
        run: playwright install chromium --with-deps

      - name: Scrape Mestic.nl (catalogue & MSRP)
        run: python3 scraper_mestic.py

      - name: Scrape retailers
        run: python3 scraper_retailers.py

      - name: Generate dashboard
        run: python3 generate_dashboard.py

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mestic_tracker.db
          if ! git diff --staged --quiet; then
            git commit -m "data: scrape $(date -u +'%Y-%m-%d')"
            git pull --rebase
            git push
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir _site
          cp dashboard.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
